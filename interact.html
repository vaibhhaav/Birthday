<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Delight | Interact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="floating-bg">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>
    <div class="balloon-layer" aria-hidden="true">
      <span class="balloon b1"></span>
      <span class="balloon b2"></span>
      <span class="balloon b3"></span>
      <span class="balloon b4"></span>
      <span class="balloon b5"></span>
    </div>

    <main class="page-shell">
      <section class="card">
        <h2>A Game to Play to Trick Your Brain</h2>
        <p class="subtitle">Completely inaccurate, slightly romantic, and made with love.</p>

        <div class="interactive-box">
          <button id="ageGuessBtn" class="btn">Guess your age</button>
          <p id="ageGuessOutput" class="wish-text age-result">Tap the button and let me pretend I can calculate elegance.</p>
        </div>

        <div class="nav-row">
          <button class="btn" onclick="smoothGoTo('gallery.html')">Back: Gallery</button>
          <button class="btn" onclick="smoothGoTo('message.html')">Next: Message</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
